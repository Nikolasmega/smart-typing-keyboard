<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 340px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .logo {
      width: 26px;
      height: 26px;
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.4));
    }
    .body { padding: 16px; }
    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 6px;
    }
    textarea {
      width: 100%;
      height: 130px;
      background: #0f0f23;
      color: #ddd;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      font-family: monospace;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: #667eea; }
    .stats {
      font-size: 11px;
      color: #666;
      margin: 5px 0 14px;
    }
    .time-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }
    .tb {
      background: #0f0f23;
      border: 1px solid #333;
      color: #ccc;
      border-radius: 6px;
      padding: 8px 4px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
    }
    .tb:hover { border-color: #667eea; color: #fff; }
    .tb.on { background: #667eea; border-color: #667eea; color: #fff; font-weight: 700; }
    .tb.pro-mode {
      border-color: #f39c12;
      color: #f39c12;
    }
    .tb.pro-mode:hover {
      border-color: #f1c40f;
      color: #fff;
    }
    .tb.pro-mode.on {
      background: #f39c12;
      border-color: #f39c12;
      color: #fff;
      font-weight: 700;
    }
    .speed-info {
      background: #0f0f23;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #888;
      margin-bottom: 14px;
      min-height: 38px;
    }
    .speed-info span { color: #adf; }
    .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn {
      padding: 11px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-start { background: #667eea; color: #fff; }
    .btn-start:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-start:not(:disabled):hover { background: #5568d3; }
    .btn-stop { background: #c0392b; color: #fff; }
    .btn-stop:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-stop:not(:disabled):hover { background: #a93226; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #f90;
    }
    #status.ok  { color: #2ecc71; }
    #status.err { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="header">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='26' height='26'%3E%3Crect x='2' y='4' width='20' height='16' rx='3' stroke='%23667eea' stroke-width='2' fill='%230f0f23'/%3E%3Crect x='5' y='7' width='2' height='2' rx='0.5' fill='%23f39c12'/%3E%3Crect x='8' y='7' width='2' height='2' rx='0.5' fill='%23667eea'/%3E%3Crect x='11' y='7' width='2' height='2' rx='0.5' fill='%23764ba2'/%3E%3Crect x='14' y='7' width='2' height='2' rx='0.5' fill='%23667eea'/%3E%3Crect x='17' y='7' width='2' height='2' rx='0.5' fill='%23f39c12'/%3E%3Crect x='5' y='11' width='2' height='2' rx='0.5' fill='%23667eea'/%3E%3Crect x='8' y='11' width='2' height='2' rx='0.5' fill='%23764ba2'/%3E%3Crect x='11' y='11' width='2' height='2' rx='0.5' fill='%23f39c12'/%3E%3Crect x='14' y='11' width='2' height='2' rx='0.5' fill='%23764ba2'/%3E%3Crect x='17' y='11' width='2' height='2' rx='0.5' fill='%23667eea'/%3E%3Crect x='7' y='15' width='10' height='2' rx='0.5' fill='%23f1c40f'/%3E%3C/svg%3E" class="logo" alt="Logo">
    <span>Smart Typing Keyboard v2.6</span>
  </div>
  <div class="body">
    <label>Your Text</label>
    <textarea id="txt" placeholder="Paste your English text here…"></textarea>
    <div class="stats" id="stats">Characters: 0</div>

    <label>Typing Duration</label>
    <div class="time-grid">
      <div class="tb" data-m="2">2 min</div>
      <div class="tb" data-m="5">5 min</div>
      <div class="tb" data-m="10">10 min</div>
      <div class="tb" data-m="15">15 min</div>
      <div class="tb" data-m="20">20 min</div>
      <div class="tb" data-m="30">30 min</div>
      <div class="tb" data-m="45">45 min</div>
      <div class="tb" data-m="60">1 hour</div>
      <div class="tb pro-mode" data-m="fast">⚡ Pro</div>
    </div>

    <div class="speed-info" id="info">Select time and paste text to see speed.</div>

    <div class="btns">
      <button class="btn btn-start" id="startBtn" disabled>▶ Start</button>
      <button class="btn btn-stop"  id="stopBtn"  disabled>■ Stop</button>
    </div>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
